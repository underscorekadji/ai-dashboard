- name: Home
  columns:
    - size: small
      widgets:
        - type: monitor
          title: AI Services Status
          cache: 5m
          sites:
            - title: GitHub
              url: https://www.githubstatus.com
              icon: si:github
            - title: OpenAI
              url: https://status.openai.com
              icon: si:openai
            - title: Anthropic
              url: https://status.anthropic.com
              icon: si:anthropic

        - type: bookmarks
          title: Quick Links
          groups:
            - title: AI Tools
              links:
                - title: ChatGPT
                  url: https://chatgpt.com
                  icon: si:openai
                - title: Claude
                  url: https://claude.ai
                  icon: si:anthropic
                - title: GitHub Copilot
                  url: https://github.com/features/copilot
                  icon: si:github

    - size: full
      widgets:
        - type: rss
          title: AI News
          limit: 15
          collapse-after: 8
          cache: 6h
          feeds:
            - url: https://openai.com/blog/rss.xml
              title: OpenAI Blog
            - url: https://raw.githubusercontent.com/Olshansk/rss-feeds/main/feeds/feed_anthropic_news.xml
              title: Anthropic News
            - url: https://raw.githubusercontent.com/Olshansk/rss-feeds/main/feeds/feed_anthropic_engineering.xml
              title: Anthropic Engineering
            - url: https://github.blog/ai-and-ml/feed/
              title: GitHub AI & ML
            - url: https://raw.githubusercontent.com/Olshansk/rss-feeds/main/feeds/feed_google_ai.xml
              title: Google AI Blog

        - type: hacker-news
          limit: 15
          collapse-after: 5

    - size: small
      widgets:
        - type: rss
          title: Paul Graham
          limit: 5
          collapse-after: 3
          cache: 24h
          feeds:
            - url: https://raw.githubusercontent.com/Olshansk/rss-feeds/main/feeds/feed_paulgraham.xml
              title: Paul Graham

        - type: reddit
          subreddit: artificial
          sort-by: top
          top-period: week
          show-thumbnails: true
